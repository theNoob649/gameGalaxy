<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tower Defense</title>
<link rel="stylesheet" href="../_shared/game.css">
<style>
  .td-layout {
    display: grid;
    grid-template-columns: auto 260px;
    align-items: start;
    gap: 10px;
    width: 100%;
    max-width: 1020px;
  }
  .td-stage {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.45);
    width: fit-content;
  }
  canvas { display: block; cursor: crosshair; border-radius: 10px; }
  .td-side {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    font-size: 13px;
    max-height: 432px;
    overflow-y: auto;
  }

  /* Clear stat tiles instead of one inline row */
  .td-stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
  }
  .td-stat {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
  }
  .td-stat .label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .td-stat .value { font-size: 18px; font-weight: 800; color: var(--text); }
  .td-stat.warn .value { color: #fcd34d; }
  .td-stat.crit .value { color: var(--bad); }
  .td-stat.money .value { color: var(--good); }
  .td-stat.wide { grid-column: span 2; display: flex; justify-content: space-between; align-items: center; }

  .td-wave-bar {
    height: 6px; border-radius: 3px;
    background: var(--bg);
    overflow: hidden;
    margin-top: 4px;
  }
  .td-wave-bar > div {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width 0.3s ease;
  }

  .td-towerlist { display: flex; flex-direction: column; gap: 6px; }
  .td-tower {
    text-align: left; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px; cursor: pointer; color: inherit; font: inherit;
  }
  .td-tower:hover:not(:disabled) { border-color: var(--accent); }
  .td-tower:disabled { opacity: 0.55; cursor: not-allowed; }
  .td-tower-row { display: flex; justify-content: space-between; }
  .td-tower-name { font-weight: 700; }
  .td-tower-cost { color: var(--good); }
  .td-tower-desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .td-controls { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .td-controls button.active { border-color: var(--accent); }
  .td-divider {
    display: inline-block;
    width: 1px; height: 22px;
    background: var(--border);
    margin: 0 4px;
  }
  .td-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--bg);
    border: 1px solid var(--border);
  }
  .td-pill strong { color: var(--text); }

  .td-section-title { text-transform: uppercase; letter-spacing: 0.06em; font-size: 11px; color: var(--text-dim); margin: 8px 0 6px; }
  @media (max-width: 760px) { .td-layout { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="game-shell">
  <div class="td-controls" style="margin-bottom: 6px;">
    <span class="td-pill">Map:</span>
    <button class="game-btn" data-map="path">The Path</button>
    <button class="game-btn" data-map="fork">The Fork</button>
    <button class="game-btn" data-map="maze">The Maze</button>
    <span class="td-divider"></span>
    <span class="td-pill">Difficulty:</span>
    <button class="game-btn" data-dif="easy">Easy</button>
    <button class="game-btn" data-dif="medium">Medium</button>
    <button class="game-btn" data-dif="hard">Hard</button>
    <span class="td-divider"></span>
    <button class="game-btn primary" id="newgame">New game</button>
    <button class="game-btn" id="pause">Pause</button>
    <button class="game-btn" id="speed">1x</button>
  </div>
  <div class="td-layout">
    <div class="td-stage"><canvas id="cv" width="640" height="420"></canvas></div>
    <div class="td-side">
      <div class="td-stat-grid">
        <div class="td-stat wide">
          <div>
            <div class="label">Wave</div>
            <div class="value"><span id="wave">0</span> / 30</div>
          </div>
          <div style="text-align: right; font-size: 11px; color: var(--text-dim);">
            <div id="difLabel">Easy</div>
          </div>
        </div>
        <div class="td-stat money">
          <div class="label">Money</div>
          <div class="value">$<span id="money">100</span></div>
        </div>
        <div class="td-stat" id="healthStat">
          <div class="label">Health</div>
          <div class="value"><span id="lives">20</span></div>
        </div>
        <div class="td-stat wide">
          <div style="flex: 1;">
            <div class="label">Kills</div>
            <div class="value"><span id="kills">0</span></div>
          </div>
        </div>
      </div>
      <button class="game-btn primary" id="nextWave" style="width: 100%; margin-bottom: 10px;">Start wave</button>
      <div class="td-section-title">Build</div>
      <div class="td-towerlist" id="towers"></div>
      <div class="td-section-title" id="upgradeTitle" style="display:none;">Selected Tower</div>
      <div id="upgradePanel"></div>
      <div class="td-section-title">Best</div>
      <div id="bests" style="color: var(--text-dim);"></div>
    </div>
  </div>
  <div class="game-message" id="msg">Pick a map, set a difficulty, place towers, then start the wave.</div>
</div>
<script src="../_shared/gg.js"></script>
<script>
const SLUG = "tower-defense";
const CELL = 40;

let saved = GG.load(SLUG, {
  mapsBeaten: [], bestWaveByMap: {}, totalEnemiesKilled: 0, difficulty: "easy",
}) || {};
saved = Object.assign({ mapsBeaten: [], bestWaveByMap: {}, totalEnemiesKilled: 0, difficulty: "easy" }, saved);

const DIFFICULTIES = {
  easy:   { name: "Easy",   health: 20, label: "Easy, 20 health" },
  medium: { name: "Medium", health: 10, label: "Medium, 10 health" },
  hard:   { name: "Hard",   health: 5,  label: "Hard, 5 health" },
};
let difficulty = DIFFICULTIES[saved.difficulty] ? saved.difficulty : "easy";

// Maps: define a list of waypoints + a buildable mask.
const MAPS = {
  path: {
    cols: 16, rows: 10,
    waypoints: [[-1, 5], [4, 5], [4, 2], [11, 2], [11, 7], [16, 7]],
  },
  fork: {
    cols: 16, rows: 10,
    waypoints: [[-1, 5], [3, 5], [3, 2], [8, 2], [8, 7], [13, 7], [13, 4], [16, 4]],
  },
  maze: {
    cols: 16, rows: 10,
    waypoints: [[-1, 1], [3, 1], [3, 4], [6, 4], [6, 1], [9, 1], [9, 7], [12, 7], [12, 3], [16, 3]],
  },
};

const TOWERS = {
  basic:  { name: "Basic",      cost: 50,  desc: "Balanced damage and range.", color: "#60a5fa", levels: [
    { dmg: 12, rate: 1.1, range: 110, cost: 50,  splash: 0,  slow: 0 },
    { dmg: 22, rate: 1.3, range: 130, cost: 80,  splash: 0,  slow: 0 },
    { dmg: 38, rate: 1.5, range: 150, cost: 130, splash: 0,  slow: 0 },
  ]},
  sniper: { name: "Sniper",     cost: 90,  desc: "Long range, slow rate, high damage.", color: "#f87171", levels: [
    { dmg: 50, rate: 0.4, range: 220, cost: 90,  splash: 0,  slow: 0 },
    { dmg: 110, rate: 0.5, range: 260, cost: 140, splash: 0, slow: 0 },
    { dmg: 220, rate: 0.6, range: 300, cost: 220, splash: 0, slow: 0 },
  ]},
  rapid:  { name: "Rapid Fire", cost: 80,  desc: "Short range, fast fire rate.", color: "#fcd34d", levels: [
    { dmg: 5,  rate: 4.5, range: 90,  cost: 80,  splash: 0,  slow: 0 },
    { dmg: 8,  rate: 6.0, range: 100, cost: 130, splash: 0,  slow: 0 },
    { dmg: 14, rate: 8.0, range: 115, cost: 200, splash: 0,  slow: 0 },
  ]},
  cannon: { name: "Cannon",     cost: 120, desc: "Splash damage to grouped enemies.", color: "#fb923c", levels: [
    { dmg: 18, rate: 0.7, range: 130, cost: 120, splash: 40, slow: 0 },
    { dmg: 36, rate: 0.85, range: 145, cost: 200, splash: 50, slow: 0 },
    { dmg: 70, rate: 1.0, range: 160, cost: 320, splash: 60, slow: 0 },
  ]},
  slow:   { name: "Slow",       cost: 60,  desc: "Slows enemies in range. No damage.", color: "#a78bfa", levels: [
    { dmg: 0,  rate: 0,   range: 100, cost: 60,  splash: 0,  slow: 0.25 },
    { dmg: 0,  rate: 0,   range: 115, cost: 90,  splash: 0,  slow: 0.35 },
    { dmg: 0,  rate: 0,   range: 130, cost: 140, splash: 0,  slow: 0.5 },
  ]},
};

const ENEMIES = {
  grunt:  { hp: 30,    speed: 50, gold: 7,   color: "#9aa3c7", radius: 9,  shape: "circle" },
  fast:   { hp: 18,    speed: 95, gold: 6,   color: "#34d399", radius: 8,  shape: "circle" },
  tank:   { hp: 200,   speed: 30, gold: 25,  color: "#fb7185", radius: 12, shape: "circle" },
  swarm:  { hp: 8,     speed: 70, gold: 2,   color: "#fcd34d", radius: 6,  shape: "circle" },
  purple: { hp: 90,    speed: 70, gold: 14,  color: "#a78bfa", radius: 10, shape: "circle" },
  boss:   { hp: 1500,  speed: 25, gold: 200, color: "#7c5cff", radius: 16, shape: "circle" },
  // wave-15 mid boss: red ball with huge HP, escorted by grey grunts.
  redBoss:  { hp: 6000,  speed: 22, gold: 500,  color: "#dc2626", radius: 22, shape: "circle" },
  // wave-30 final boss: bigger, more HP, wears a crown, escorted by purples.
  kingBoss: { hp: 25000, speed: 18, gold: 2000, color: "#7c2d12", radius: 28, shape: "crown" },
};

const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
const moneyEl = document.getElementById("money");
const livesEl = document.getElementById("lives");
const waveEl = document.getElementById("wave");
const killsEl = document.getElementById("kills");
const msgEl = document.getElementById("msg");
const towersListEl = document.getElementById("towers");
const upgradePanel = document.getElementById("upgradePanel");
const upgradeTitle = document.getElementById("upgradeTitle");
const bestsEl = document.getElementById("bests");

let mapId = "path";
let map, path, buildable;
let towers = [];
let enemies = [];
let bullets = [];
let money = 100;
let lives = 20;
let wave = 0;
let kills = 0;
let inWave = false;
let paused = false;
let speedMult = 1;
let selectedToBuy = null;       // tower kind to place
let selectedTower = null;       // existing placed tower
let pendingSpawns = [];         // [{kind, atTime}]
let lastTime = 0;
let lostGame = false;
let wonGame = false;

function loadMap(id) {
  mapId = id;
  map = MAPS[id];
  path = computePath(map.waypoints);
  buildable = computeBuildable(map);
}

function computePath(waypoints) {
  // expand waypoints into a list of pixel-positions every ~1px
  const out = [];
  for (let i = 0; i < waypoints.length - 1; i++) {
    const a = waypoints[i], b = waypoints[i + 1];
    const ax = a[0] * CELL + CELL / 2;
    const ay = a[1] * CELL + CELL / 2;
    const bx = b[0] * CELL + CELL / 2;
    const by = b[1] * CELL + CELL / 2;
    const dx = bx - ax, dy = by - ay;
    const dist = Math.hypot(dx, dy);
    const steps = Math.max(1, Math.round(dist));
    for (let s = 0; s <= steps; s++) {
      const t = s / steps;
      out.push({ x: ax + dx * t, y: ay + dy * t });
    }
  }
  return out;
}

function computeBuildable(m) {
  const grid = Array.from({ length: m.rows }, () => Array(m.cols).fill(true));
  // mark cells along the path as not buildable (small radius)
  for (const p of path) {
    const cc = Math.floor(p.x / CELL);
    const cr = Math.floor(p.y / CELL);
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      const r = cr + dr, c = cc + dc;
      if (r >= 0 && r < m.rows && c >= 0 && c < m.cols) {
        if (Math.abs(dr) + Math.abs(dc) <= 1) grid[r][c] = false;
      }
    }
  }
  return grid;
}

// HP/gold scaling per wave so wave 19 isn't as easy as wave 12.
function waveHpMult(n) { return 1 + (n - 1) * 0.16; }
function waveGoldMult(n) { return 1 + (n - 1) * 0.05; }

function generateWave(n) {
  // returns list of {kind, gap}
  const out = [];

  // Special bosses
  if (n === 15) {
    out.push({ kind: "redBoss", gap: 0 });
    // grey-ball (grunt) minions in close formation
    for (let i = 0; i < 16; i++) out.push({ kind: "grunt", gap: 0.35 });
    return out;
  }
  if (n === 30) {
    out.push({ kind: "kingBoss", gap: 0 });
    // purple minions for the king
    for (let i = 0; i < 22; i++) out.push({ kind: "purple", gap: 0.4 });
    for (let i = 0; i < 10; i++) out.push({ kind: "tank",   gap: 0.7 });
    return out;
  }
  // Standard boss waves at 5, 10, 20, 25
  if (n % 5 === 0) {
    out.push({ kind: "boss", gap: 0 });
    for (let i = 0; i < 6 + n; i++) out.push({ kind: "grunt", gap: 0.6 });
    if (n >= 16) for (let i = 0; i < 5 + Math.floor(n / 4); i++) out.push({ kind: "purple", gap: 0.55 });
    return out;
  }

  // Regular waves, counts ramp faster than before
  const grunts = 5 + Math.floor(n * 1.8);
  for (let i = 0; i < grunts; i++) out.push({ kind: "grunt", gap: 0.45 });
  if (n >= 2) for (let i = 0; i < 4 + Math.floor(n * 1.2); i++) out.push({ kind: "fast", gap: 0.3 });
  if (n >= 3) for (let i = 0; i < Math.max(1, Math.floor(n / 1.5)); i++) out.push({ kind: "tank", gap: 0.85 });
  if (n >= 4) for (let i = 0; i < 14 + n * 2; i++) out.push({ kind: "swarm", gap: 0.16 });

  // Purples introduced at wave 11, but become common after wave 16
  if (n >= 11) {
    const purples = n >= 17 ? 6 + Math.floor((n - 16) * 1.8) : Math.max(1, n - 10);
    for (let i = 0; i < purples; i++) out.push({ kind: "purple", gap: 0.5 });
  }

  // Shuffle for variety
  out.sort(() => Math.random() - 0.5);
  return out;
}

// --- towers list panel ---
function renderTowersList() {
  towersListEl.innerHTML = "";
  Object.entries(TOWERS).forEach(([id, t]) => {
    const btn = document.createElement("button");
    btn.className = "td-tower";
    btn.disabled = money < t.cost;
    btn.innerHTML = `
      <div class="td-tower-row">
        <span class="td-tower-name" style="color:${t.color}">${t.name}</span>
        <span class="td-tower-cost">$${t.cost}</span>
      </div>
      <div class="td-tower-desc">${t.desc}</div>
    `;
    btn.addEventListener("click", () => {
      selectedToBuy = id;
      selectedTower = null;
      msgEl.textContent = `Click a buildable tile to place a ${t.name} ($${t.cost}).`;
    });
    towersListEl.appendChild(btn);
  });
}

function renderUpgradePanel() {
  upgradePanel.innerHTML = "";
  if (!selectedTower) {
    upgradeTitle.style.display = "none";
    return;
  }
  upgradeTitle.style.display = "block";
  const t = TOWERS[selectedTower.kind];
  const lvl = selectedTower.level;
  const next = t.levels[lvl + 1];
  const upgradeBtn = document.createElement("button");
  upgradeBtn.className = "td-tower";
  if (next) {
    upgradeBtn.disabled = money < next.cost;
    upgradeBtn.innerHTML = `
      <div class="td-tower-row">
        <span class="td-tower-name">Upgrade to lvl ${lvl + 2}</span>
        <span class="td-tower-cost">$${next.cost}</span>
      </div>
      <div class="td-tower-desc">dmg ${next.dmg} · rate ${next.rate}/s · range ${next.range}${next.splash ? ` · splash ${next.splash}` : ""}${next.slow ? ` · slow ${(next.slow * 100).toFixed(0)}%` : ""}</div>
    `;
    upgradeBtn.addEventListener("click", () => {
      if (money < next.cost) return;
      money -= next.cost;
      selectedTower.level++;
      Object.assign(selectedTower, t.levels[selectedTower.level]);
      moneyEl.textContent = money;
      renderTowersList(); renderUpgradePanel();
    });
  } else {
    upgradeBtn.disabled = true;
    upgradeBtn.textContent = "Max level";
  }
  upgradePanel.appendChild(upgradeBtn);
  const sellBtn = document.createElement("button");
  sellBtn.className = "td-tower";
  const refund = Math.floor(t.levels.slice(0, lvl + 1).reduce((s, x) => s + x.cost, 0) * 0.6);
  sellBtn.innerHTML = `
    <div class="td-tower-row">
      <span class="td-tower-name">Sell</span>
      <span class="td-tower-cost" style="color:var(--bad)">$${refund}</span>
    </div>
  `;
  sellBtn.addEventListener("click", () => {
    money += refund;
    towers = towers.filter((tw) => tw !== selectedTower);
    selectedTower = null;
    moneyEl.textContent = money;
    renderTowersList(); renderUpgradePanel();
  });
  upgradePanel.appendChild(sellBtn);
}

// --- input ---
let hoverCell = null;  // {r, c} or null, used to preview the tower being placed
function cellFromEvent(e) {
  const rect = cv.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * cv.width / rect.width;
  const my = (e.clientY - rect.top) * cv.height / rect.height;
  return { r: Math.floor(my / CELL), c: Math.floor(mx / CELL) };
}
cv.addEventListener("mousemove", (e) => {
  const { r, c } = cellFromEvent(e);
  if (r < 0 || r >= map.rows || c < 0 || c >= map.cols) { hoverCell = null; return; }
  hoverCell = { r, c };
});
cv.addEventListener("mouseleave", () => { hoverCell = null; });

cv.addEventListener("click", (e) => {
  const rect = cv.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * cv.width / rect.width;
  const my = (e.clientY - rect.top) * cv.height / rect.height;
  const cc = Math.floor(mx / CELL);
  const cr = Math.floor(my / CELL);
  if (cr < 0 || cr >= map.rows || cc < 0 || cc >= map.cols) return;
  // pick existing tower?
  const at = towers.find((t) => t.cellC === cc && t.cellR === cr);
  if (at) {
    selectedTower = at;
    selectedToBuy = null;
    renderUpgradePanel();
    return;
  }
  // place new
  if (selectedToBuy && buildable[cr][cc]) {
    const t = TOWERS[selectedToBuy];
    if (money < t.cost) { msgEl.textContent = "Not enough money."; return; }
    money -= t.cost;
    moneyEl.textContent = money;
    const tw = {
      kind: selectedToBuy,
      cellC: cc, cellR: cr,
      x: cc * CELL + CELL / 2,
      y: cr * CELL + CELL / 2,
      level: 0,
      cooldown: 0,
      ...t.levels[0],
    };
    towers.push(tw);
    buildable[cr][cc] = false;
    selectedToBuy = null;
    selectedTower = tw;
    msgEl.textContent = `Placed ${t.name}. Click it to upgrade.`;
    renderTowersList();
    renderUpgradePanel();
  }
});

document.querySelectorAll('[data-map]').forEach((b) => {
  b.addEventListener("click", () => {
    document.querySelectorAll('[data-map]').forEach((x) => x.classList.toggle("active", x === b));
    loadMap(b.dataset.map);
    newGame();
  });
});
document.querySelector('[data-map="path"]').classList.add("active");

document.querySelectorAll('[data-dif]').forEach((b) => {
  b.addEventListener("click", () => {
    document.querySelectorAll('[data-dif]').forEach((x) => x.classList.toggle("active", x === b));
    difficulty = b.dataset.dif;
    saved.difficulty = difficulty;
    GG.save(SLUG, saved);
    newGame();
  });
});
document.querySelector(`[data-dif="${difficulty}"]`).classList.add("active");

document.getElementById("newgame").addEventListener("click", newGame);
document.getElementById("pause").addEventListener("click", (e) => {
  paused = !paused;
  e.target.textContent = paused ? "Resume" : "Pause";
});
document.getElementById("speed").addEventListener("click", (e) => {
  speedMult = speedMult === 1 ? 2 : speedMult === 2 ? 4 : 1;
  e.target.textContent = speedMult + "x";
});
document.getElementById("nextWave").addEventListener("click", () => {
  if (lostGame || wonGame) return;
  if (inWave) return;
  wave++;
  waveEl.textContent = wave;
  pendingSpawns = generateWave(wave).map((s, i) => ({ ...s }));
  inWave = true;
  msgEl.textContent = `Wave ${wave} incoming.`;
});

function newGame() {
  loadMap(mapId);
  towers = []; enemies = []; bullets = [];
  money = 100;
  lives = DIFFICULTIES[difficulty].health;
  wave = 0; kills = 0;
  inWave = false; pendingSpawns = []; lostGame = false; wonGame = false;
  paused = false;
  selectedToBuy = null; selectedTower = null;
  document.getElementById("pause").textContent = "Pause";
  moneyEl.textContent = money;
  livesEl.textContent = lives;
  waveEl.textContent = 0;
  killsEl.textContent = 0;
  updateHealthTone();
  document.getElementById("difLabel").textContent = DIFFICULTIES[difficulty].label;
  msgEl.textContent = "Place towers, then start the wave.";
  renderTowersList();
  renderUpgradePanel();
  updateBests();
}

function updateHealthTone() {
  const stat = document.getElementById("healthStat");
  if (!stat) return;
  const max = DIFFICULTIES[difficulty].health;
  const r = lives / max;
  stat.classList.toggle("warn", r > 0.25 && r <= 0.5);
  stat.classList.toggle("crit", r <= 0.25);
}

function updateBests() {
  const html = Object.entries(MAPS).map(([id]) => {
    const w = saved.bestWaveByMap[id] || 0;
    const beat = saved.mapsBeaten.includes(id) ? " ✓" : "";
    return `${MAPS[id] ? id : ""}: wave ${w}${beat}`;
  }).join("<br>");
  bestsEl.innerHTML = html;
}

// --- spawning during wave ---
let spawnTimer = 0;
function maybeSpawn(dt) {
  if (!inWave) return;
  spawnTimer -= dt;
  if (spawnTimer > 0) return;
  if (!pendingSpawns.length) {
    if (enemies.length === 0) onWaveCleared();
    return;
  }
  const next = pendingSpawns.shift();
  const def = ENEMIES[next.kind];
  // Bosses scale only modestly with their wave; mooks scale more aggressively
  const isBoss = next.kind === "boss" || next.kind === "redBoss" || next.kind === "kingBoss";
  const hpMult = isBoss ? 1 + (wave - 1) * 0.04 : waveHpMult(wave);
  const goldMult = waveGoldMult(wave);
  enemies.push({
    kind: next.kind, ...def,
    maxHp: Math.round(def.hp * hpMult),
    hp:    Math.round(def.hp * hpMult),
    gold:  Math.round(def.gold * goldMult),
    pathIdx: 0, slowUntil: 0, slowFactor: 1,
  });
  spawnTimer = next.gap || 0.3;
}

function onWaveCleared() {
  inWave = false;
  money += 50 + wave * 10;
  moneyEl.textContent = money;
  msgEl.textContent = `Wave ${wave} cleared! +$${50 + wave * 10}.`;
  if (wave >= 30) {
    wonGame = true;
    msgEl.textContent = `You beat ${mapId.toUpperCase()} in 30 waves!`;
    if (!saved.mapsBeaten.includes(mapId)) saved.mapsBeaten.push(mapId);
    if (window.GG && GG.youWin) GG.youWin("You Win!", `Cleared ${mapId.toUpperCase()}. 30 waves survived.`);
  }
  saved.bestWaveByMap[mapId] = Math.max(saved.bestWaveByMap[mapId] || 0, wave);
  GG.save(SLUG, saved);
  updateBests();
  renderTowersList();
}

// --- combat tick ---
function tick(now) {
  if (!lastTime) lastTime = now;
  const realDt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;
  try {
    if (!paused) {
      const dt = realDt * speedMult;
      maybeSpawn(dt);
      moveEnemies(dt);
      fireTowers(dt);
      moveBullets(dt);
    }
    draw();
  } catch (err) {
    console.error("Tower Defense tick error:", err);
    msgEl.textContent = "Game error: " + err.message + ". See console.";
  }
  requestAnimationFrame(tick);
}

function moveEnemies(dt) {
  for (const e of enemies.slice()) {
    let factor = 1;
    if (e.slowUntil > performance.now()) factor *= e.slowFactor;
    // check slow towers in range
    const ep = ePos(e);
    for (const t of towers) {
      if (t.slow > 0) {
        const d = Math.hypot(ep.x - t.x, ep.y - t.y);
        if (d <= t.range) factor = Math.min(factor, 1 - t.slow);
      }
    }
    e.pathIdx += e.speed * factor * dt;
    if (e.pathIdx >= path.length - 1) {
      enemies = enemies.filter((x) => x !== e);
      lives--;
      livesEl.textContent = lives;
      updateHealthTone();
      if (lives <= 0) gameOver();
    }
  }
}

function ePos(e) { return path[Math.min(path.length - 1, Math.floor(e.pathIdx))]; }

function fireTowers(dt) {
  for (const t of towers) {
    if (!t.dmg) continue;
    t.cooldown -= dt;
    if (t.cooldown > 0) continue;
    const target = pickTarget(t);
    if (!target) continue;
    // per-tower projectile profile
    const profiles = {
      basic:  { speed: 460, size: 4,  trail: 0, type: "bolt" },
      sniper: { speed: 1100, size: 2, trail: 1, type: "laser" },
      rapid:  { speed: 600, size: 2,  trail: 0, type: "pellet" },
      cannon: { speed: 280, size: 9,  trail: 0, type: "shell" },
    };
    const prof = profiles[t.kind] || profiles.basic;
    bullets.push({
      x: t.x, y: t.y,
      tx: ePos(target).x, ty: ePos(target).y,
      target,
      dmg: t.dmg,
      splash: t.splash,
      color: TOWERS[t.kind].color,
      speed: prof.speed,
      size: prof.size,
      trail: prof.trail,
      type: prof.type,
      origin: { x: t.x, y: t.y },
      tail: [],   // recent positions for trails
    });
    t.cooldown = 1 / Math.max(0.01, t.rate);
  }
}

function pickTarget(t) {
  let best = null, bestProgress = -1;
  for (const e of enemies) {
    const p = ePos(e);
    const d = Math.hypot(p.x - t.x, p.y - t.y);
    if (d > t.range) continue;
    if (e.pathIdx > bestProgress) { bestProgress = e.pathIdx; best = e; }
  }
  return best;
}

function moveBullets(dt) {
  for (const b of bullets.slice()) {
    if (!b.target || b.target.hp <= 0) {
      b.target = null;
    }
    if (b.target) {
      const p = ePos(b.target);
      b.tx = p.x; b.ty = p.y;
    }
    const dx = b.tx - b.x, dy = b.ty - b.y;
    const d = Math.hypot(dx, dy);
    const step = b.speed * dt;
    if (d <= step) {
      // hit
      if (b.splash > 0) {
        for (const e of enemies) {
          const ep = ePos(e);
          if (Math.hypot(ep.x - b.tx, ep.y - b.ty) <= b.splash) damage(e, b.dmg);
        }
      } else if (b.target) {
        damage(b.target, b.dmg);
      }
      bullets = bullets.filter((x) => x !== b);
    } else {
      b.x += dx / d * step;
      b.y += dy / d * step;
      if (b.tail) {
        b.tail.push({ x: b.x, y: b.y });
        const max = b.type === "shell" ? 8 : b.type === "laser" ? 12 : 5;
        if (b.tail.length > max) b.tail.shift();
      }
    }
  }
}

function damage(e, d) {
  e.hp -= d;
  if (e.hp <= 0) {
    money += e.gold;
    moneyEl.textContent = money;
    kills++;
    saved.totalEnemiesKilled = (saved.totalEnemiesKilled || 0) + 1;
    killsEl.textContent = kills;
    enemies = enemies.filter((x) => x !== e);
    renderTowersList();
  }
}

function gameOver() {
  lostGame = true;
  inWave = false;
  msgEl.textContent = `Game over on wave ${wave}.`;
  GG.save(SLUG, saved);
  if (window.GG && GG.youLose) GG.youLose("You Lose", `Defeated on wave ${wave} of ${mapId.toUpperCase()}.`);
}

// --- drawing ---
function draw() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  // grass
  ctx.fillStyle = "#1f3a1f";
  ctx.fillRect(0, 0, cv.width, cv.height);
  // checker
  for (let r = 0; r < map.rows; r++) for (let c = 0; c < map.cols; c++) {
    if ((r + c) % 2 === 0) {
      ctx.fillStyle = "rgba(0,0,0,0.06)";
      ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
    }
  }
  // path
  ctx.strokeStyle = "#a07a4a";
  ctx.lineWidth = CELL * 0.7;
  ctx.lineJoin = "round"; ctx.lineCap = "round";
  ctx.beginPath();
  for (let i = 0; i < map.waypoints.length; i++) {
    const [c, r] = map.waypoints[i];
    const x = c * CELL + CELL / 2, y = r * CELL + CELL / 2;
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
  }
  ctx.stroke();
  ctx.strokeStyle = "rgba(0,0,0,0.2)"; ctx.lineWidth = 2;
  // build hint
  if (selectedToBuy) {
    for (let r = 0; r < map.rows; r++) for (let c = 0; c < map.cols; c++) {
      if (buildable[r][c]) {
        ctx.fillStyle = "rgba(124,92,255,0.12)";
        ctx.fillRect(c * CELL + 2, r * CELL + 2, CELL - 4, CELL - 4);
      }
    }
    // ghost preview of the tower being placed at the hovered cell
    if (hoverCell) {
      const t = TOWERS[selectedToBuy];
      const stats = t.levels[0];
      const x = hoverCell.c * CELL + CELL / 2;
      const y = hoverCell.r * CELL + CELL / 2;
      const ok = buildable[hoverCell.r][hoverCell.c] && money >= t.cost;
      // range circle
      ctx.save();
      ctx.fillStyle = ok ? "rgba(124,92,255,0.12)" : "rgba(248,113,113,0.12)";
      ctx.strokeStyle = ok ? "rgba(124,92,255,0.55)" : "rgba(248,113,113,0.7)";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 5]);
      ctx.beginPath(); ctx.arc(x, y, stats.range, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.setLineDash([]);
      // ghost tower body
      ctx.globalAlpha = ok ? 0.7 : 0.4;
      ctx.fillStyle = t.color;
      ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "rgba(0,0,0,0.4)";
      ctx.fillRect(x - 2, y - 16, 4, 12); // barrel
      ctx.globalAlpha = 1;
      // red X if blocked
      if (!ok) {
        ctx.strokeStyle = "rgba(248,113,113,0.9)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x - 12, y - 12); ctx.lineTo(x + 12, y + 12);
        ctx.moveTo(x + 12, y - 12); ctx.lineTo(x - 12, y + 12);
        ctx.stroke();
      }
      ctx.restore();
    }
  }
  // towers
  for (const t of towers) {
    const baseR = 14 + t.level * 2;
    ctx.fillStyle = TOWERS[t.kind].color;
    ctx.beginPath(); ctx.arc(t.x, t.y, baseR, 0, Math.PI * 2); ctx.fill();
    // upgrade stripes, 1 ring at lvl 0, 2 at lvl 1, 3 at lvl 2 (= max)
    ctx.lineWidth = 2;
    ctx.strokeStyle = "rgba(255,255,255,0.85)";
    for (let i = 0; i <= t.level; i++) {
      const r = baseR + 4 + i * 4;
      ctx.beginPath(); ctx.arc(t.x, t.y, r, 0, Math.PI * 2); ctx.stroke();
    }
    // barrel
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(t.x - 2, t.y - 16 - t.level * 2, 4, 12 + t.level * 2);
  }
  // selected range
  if (selectedTower) {
    ctx.strokeStyle = "rgba(243,244,255,0.4)";
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(selectedTower.x, selectedTower.y, selectedTower.range, 0, Math.PI * 2); ctx.stroke();
  }
  // enemies
  for (const e of enemies) {
    const p = ePos(e);
    drawEnemy(p.x, p.y, e);
  }
  // bullets
  for (const b of bullets) drawBullet(b);
}

function drawEnemy(x, y, e) {
  const r = e.radius;
  ctx.save();
  // body
  if (e.kind === "kingBoss") {
    // dark purple body with glowing rim
    const g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 2, x, y, r);
    g.addColorStop(0, "#a855f7");
    g.addColorStop(1, e.color);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    // crown on top
    ctx.fillStyle = "#fcd34d";
    const cx = x, cy = y - r - 2;
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.7, cy + 6);
    ctx.lineTo(cx - r * 0.7, cy - 4);
    ctx.lineTo(cx - r * 0.35, cy);
    ctx.lineTo(cx, cy - 8);
    ctx.lineTo(cx + r * 0.35, cy);
    ctx.lineTo(cx + r * 0.7, cy - 4);
    ctx.lineTo(cx + r * 0.7, cy + 6);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#dc2626";
    ctx.beginPath(); ctx.arc(cx, cy - 6, 2.5, 0, Math.PI * 2); ctx.fill();
  } else if (e.kind === "redBoss") {
    const g = ctx.createRadialGradient(x - r * 0.4, y - r * 0.4, 2, x, y, r);
    g.addColorStop(0, "#fca5a5");
    g.addColorStop(1, "#7f1d1d");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    // angry eyes
    ctx.fillStyle = "#1a0808";
    ctx.fillRect(x - 7, y - 2, 5, 3);
    ctx.fillRect(x + 2, y - 2, 5, 3);
  } else if (e.kind === "boss") {
    const g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 2, x, y, r);
    g.addColorStop(0, "#c4b5fd");
    g.addColorStop(1, e.color);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  } else if (e.kind === "purple") {
    ctx.fillStyle = e.color;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    // diamond marking
    ctx.strokeStyle = "rgba(255,255,255,0.7)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x, y - r * 0.6);
    ctx.lineTo(x + r * 0.6, y);
    ctx.lineTo(x, y + r * 0.6);
    ctx.lineTo(x - r * 0.6, y);
    ctx.closePath();
    ctx.stroke();
  } else {
    ctx.fillStyle = e.color;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
  // hp bar
  const w = r * 2;
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(x - w / 2, y - r - 6, w, 3);
  ctx.fillStyle = e.hp / e.maxHp > 0.5 ? "#34d399" : e.hp / e.maxHp > 0.25 ? "#fcd34d" : "#f87171";
  ctx.fillRect(x - w / 2, y - r - 6, w * Math.max(0, e.hp / e.maxHp), 3);
}

function drawBullet(b) {
  ctx.save();
  if (b.type === "laser") {
    // bright thin streak from origin to current position
    const grd = ctx.createLinearGradient(b.origin.x, b.origin.y, b.x, b.y);
    grd.addColorStop(0, "rgba(248,113,113,0)");
    grd.addColorStop(1, b.color);
    ctx.strokeStyle = grd;
    ctx.lineWidth = 2.5;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(b.origin.x, b.origin.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
    // glowing tip
    ctx.fillStyle = "white";
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2); ctx.fill();
  } else if (b.type === "shell") {
    // smoke trail
    if (b.tail) {
      for (let i = 0; i < b.tail.length; i++) {
        const p = b.tail[i];
        const a = (i + 1) / b.tail.length;
        ctx.fillStyle = `rgba(150, 150, 150, ${0.3 * a})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, b.size * (0.5 + a * 0.5), 0, Math.PI * 2); ctx.fill();
      }
    }
    // big orange shell
    const grd = ctx.createRadialGradient(b.x - b.size * 0.3, b.y - b.size * 0.3, 1, b.x, b.y, b.size);
    grd.addColorStop(0, "#fde68a");
    grd.addColorStop(1, b.color);
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2); ctx.stroke();
  } else if (b.type === "pellet") {
    // tiny fast pellet, square-ish, no trail
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x - b.size, b.y - b.size, b.size * 2, b.size * 2);
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.fillRect(b.x - b.size + 1, b.y - b.size + 1, b.size, b.size);
  } else {
    // basic bolt, round, glowing
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

newGame();
requestAnimationFrame(tick);
</script>
</body>
</html>
