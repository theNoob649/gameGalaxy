<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Color Switch</title>
<link rel="stylesheet" href="../_shared/game.css">
<style>
  .cs-shop { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .cs-shop button { font-size: 12px; }
  .cs-shop button.locked { opacity: 0.55; }
  .cs-shop button.active { border-color: var(--accent); color: var(--text); }
</style>
</head>
<body>
<div class="game-shell">
  <div class="game-hud">
    <span>Score: <strong id="score">0</strong></span>
    <span>Best: <strong id="best">0</strong></span>
    <span>Stars: <strong id="stars">0</strong></span>
    <button class="game-btn primary" id="play">Play</button>
  </div>
  <canvas id="cv" width="360" height="600"></canvas>
  <div id="shop" class="cs-shop"></div>
  <div class="game-message" id="msg">Click / spacebar to bounce. Match the ball's color through obstacles.</div>
</div>
<script src="../_shared/gg.js"></script>
<script>
const SLUG = "color-switch";
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
const W = cv.width, H = cv.height;

const COLORS = ["#f87171", "#fcd34d", "#34d399", "#60a5fa"];
const COLOR_NAMES = ["red", "yellow", "green", "blue"];

const SKINS = {
  basic:  { cost: 0,    name: "Basic",   draw: drawBasic },
  stripe: { cost: 50,   name: "Striped", draw: drawStripe },
  glow:   { cost: 200,  name: "Glow",    draw: drawGlow },
  flame:  { cost: 500,  name: "Flame",   draw: drawFlame },
  rainbow:{ cost: 1000, name: "Rainbow", draw: drawRainbow },
};

let saved = GG.load(SLUG, {
  highScore: 0, totalStars: 0, currentSkin: "basic", unlockedSkins: ["basic"],
}) || {};
saved = Object.assign({ highScore: 0, totalStars: 0, currentSkin: "basic", unlockedSkins: ["basic"] }, saved);
if (!saved.unlockedSkins.includes("basic")) saved.unlockedSkins.push("basic");

const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const starsEl = document.getElementById("stars");
const shopEl = document.getElementById("shop");
const msgEl = document.getElementById("msg");
bestEl.textContent = saved.highScore;
starsEl.textContent = saved.totalStars;

let ball, obstacles, stars, score, alive, started, scrollY, lastTs;

function reset() {
  ball = { x: W / 2, y: H - 80, vy: 0, r: 11, color: COLORS[Math.floor(Math.random() * 4)] };
  obstacles = [];
  stars = [];
  scrollY = 0;
  score = 0; alive = true; started = false;
  lastTs = 0;
  scoreEl.textContent = 0;
  msgEl.textContent = "Click / spacebar to bounce. Match the ball's color through obstacles.";
  // pre-populate above
  let y = H - 220;
  for (let i = 0; i < 8; i++) {
    spawnNext(y);
    y -= 220;
  }
}

function spawnNext(y) {
  const types = ["circle", "swing", "bars", "cross", "square"];
  const type = types[Math.floor(Math.random() * types.length)];
  obstacles.push(makeObstacle(type, y));
  // a star checkpoint between obstacles
  stars.push({ x: W / 2, y: y + 110, r: 9, taken: false });
}

function makeObstacle(type, y) {
  // radians per second; signed for direction
  const speed = (Math.random() < 0.5 ? -1 : 1) * (0.7 + Math.random() * 0.9);
  return { type, y, angle: 0, speed, phase: Math.random() * Math.PI * 2 };
}

function jump() {
  if (!alive) return;
  started = true;
  ball.vy = -440;  // px per second
}

window.addEventListener("keydown", (e) => {
  if (e.key === " " || e.code === "Space") { e.preventDefault(); jump(); }
});
cv.addEventListener("mousedown", jump);
cv.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); });
document.getElementById("play").addEventListener("click", () => {
  reset();
  requestAnimationFrame(tick);
});

function tick(ts) {
  const dt = lastTs ? Math.min(0.033, (ts - lastTs) / 1000) : 0.016;
  lastTs = ts;

  if (!alive) { draw(); return; }

  if (started) {
    ball.vy += 1300 * dt;     // gravity, px/s²
    ball.y  += ball.vy * dt;
    // scroll: keep ball roughly at 60% from top
    const targetCamY = ball.y - H * 0.6;
    if (targetCamY < scrollY) scrollY = targetCamY;
    // off bottom
    if (ball.y - scrollY > H + 30) return die("Fell off the screen.");
  }

  for (const o of obstacles) o.angle += o.speed * dt;

  // collisions with obstacles when ball is near their y band
  for (const o of obstacles) {
    const yScreen = o.y - scrollY;
    if (Math.abs(ball.y - o.y) < 60) {
      const hit = hitColor(o);
      if (hit && hit !== ball.color) return die("Wrong color!");
    }
    if (yScreen > H + 100) {
      // recycle
      const top = Math.min(...obstacles.map((x) => x.y));
      o.y = top - 220;
      o.angle = 0;
      o.phase = Math.random() * Math.PI * 2;
    }
  }

  for (const s of stars) {
    if (s.taken) continue;
    const dx = ball.x - s.x, dy = ball.y - s.y;
    if (dx * dx + dy * dy < (s.r + ball.r) * (s.r + ball.r)) {
      s.taken = true;
      score++;
      saved.totalStars = (saved.totalStars || 0) + 1;
      saved.highScore = Math.max(saved.highScore || 0, score);
      scoreEl.textContent = score;
      starsEl.textContent = saved.totalStars;
      bestEl.textContent = saved.highScore;
      // pick a new color (different from current)
      let c = ball.color;
      while (c === ball.color) c = COLORS[Math.floor(Math.random() * COLORS.length)];
      ball.color = c;
      GG.save(SLUG, saved);
      renderShop();
    }
    if (s.y - scrollY > H + 100) {
      const top = Math.min(...stars.map((x) => x.y));
      s.y = top - 220;
      s.taken = false;
    }
  }

  draw();
  requestAnimationFrame(tick);
}

// --- collision helpers per obstacle type ---
function angleFor(o) { return o.angle; }

function hitColor(o) {
  // returns the color of the obstacle section the ball overlaps, or null if not colliding.
  switch (o.type) {
    case "circle":  return hitCircle(o);
    case "swing":   return hitSwing(o);
    case "bars":    return hitBars(o);
    case "cross":   return hitCross(o);
    case "square":  return hitSquare(o);
  }
  return null;
}

function ballNearCenter(o, r1, r2) {
  const dx = ball.x - W / 2, dy = ball.y - o.y;
  const d2 = dx * dx + dy * dy;
  return d2 >= r1 * r1 && d2 <= r2 * r2;
}

function hitCircle(o) {
  // 4 quarters at radius 90, ring thickness 12
  if (!ballNearCenter(o, 78, 102)) return null;
  let a = Math.atan2(ball.y - o.y, ball.x - W / 2) - o.angle;
  a = ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const idx = Math.floor(a / (Math.PI / 2)) % 4;
  return COLORS[idx];
}

function hitSwing(o) {
  // bar that swings; thickness 12, length 200
  const swing = Math.sin(o.angle * 0.5) * (Math.PI / 3);
  const cx = W / 2, cy = o.y;
  const dx = ball.x - cx, dy = ball.y - cy;
  const cos = Math.cos(-swing), sin = Math.sin(-swing);
  const lx = dx * cos - dy * sin;
  const ly = dx * sin + dy * cos;
  if (Math.abs(ly) <= 8 && Math.abs(lx) <= 100) {
    const idx = Math.floor((lx + 100) / 50);
    return COLORS[Math.max(0, Math.min(3, idx))];
  }
  return null;
}

function hitBars(o) {
  // 4 vertical bars sliding horizontally
  const offset = Math.sin(o.angle * 0.5) * 60;
  if (Math.abs(ball.y - o.y) > 6) return null;
  for (let i = 0; i < 4; i++) {
    const bx = (W / 5) * (i + 1) + offset - W / 2 + W / 2;
    if (Math.abs(ball.x - bx) <= 14) return COLORS[i];
  }
  return null;
}

function hitCross(o) {
  // two perpendicular lines spinning
  if (!ballNearCenter(o, 0, 100)) return null;
  for (let k = 0; k < 2; k++) {
    const a = o.angle + (k * Math.PI / 2);
    const cos = Math.cos(-a), sin = Math.sin(-a);
    const dx = ball.x - W / 2, dy = ball.y - o.y;
    const lx = dx * cos - dy * sin;
    const ly = dx * sin + dy * cos;
    if (Math.abs(ly) <= 8 && Math.abs(lx) <= 100) {
      const idx = Math.floor((lx + 100) / 50);
      return COLORS[Math.max(0, Math.min(3, idx))];
    }
  }
  return null;
}

function hitSquare(o) {
  // outline of a rotating square
  const size = 80;
  const cos = Math.cos(-o.angle), sin = Math.sin(-o.angle);
  const dx = ball.x - W / 2, dy = ball.y - o.y;
  const lx = dx * cos - dy * sin;
  const ly = dx * sin + dy * cos;
  const onTop = Math.abs(ly + size) < 8 && Math.abs(lx) <= size;
  const onBot = Math.abs(ly - size) < 8 && Math.abs(lx) <= size;
  const onL  = Math.abs(lx + size) < 8 && Math.abs(ly) <= size;
  const onR  = Math.abs(lx - size) < 8 && Math.abs(ly) <= size;
  if (onTop) return COLORS[0];
  if (onR)   return COLORS[1];
  if (onBot) return COLORS[2];
  if (onL)   return COLORS[3];
  return null;
}

function draw() {
  ctx.fillStyle = "#0a0e1f";
  ctx.fillRect(0, 0, W, H);
  // far stars
  for (let i = 0; i < 40; i++) {
    const sx = (i * 53) % W;
    const sy = ((i * 91) - scrollY * 0.2) % H;
    ctx.fillStyle = "rgba(255,255,255,0.18)";
    ctx.fillRect(sx, ((sy % H) + H) % H, 2, 2);
  }
  for (const o of obstacles) drawObstacle(o);
  for (const s of stars) drawStar(s);
  // ball
  const sk = SKINS[saved.currentSkin] || SKINS.basic;
  sk.draw();
}

function drawObstacle(o) {
  const yS = o.y - scrollY;
  if (yS < -120 || yS > H + 120) return;
  const cx = W / 2;
  if (o.type === "circle") {
    ctx.lineWidth = 14;
    for (let i = 0; i < 4; i++) {
      ctx.strokeStyle = COLORS[i];
      ctx.beginPath();
      ctx.arc(cx, yS, 90, o.angle + i * Math.PI / 2, o.angle + (i + 1) * Math.PI / 2);
      ctx.stroke();
    }
  } else if (o.type === "swing") {
    const swing = Math.sin(o.angle * 0.5) * (Math.PI / 3);
    ctx.save(); ctx.translate(cx, yS); ctx.rotate(swing);
    ctx.lineWidth = 14;
    for (let i = 0; i < 4; i++) {
      ctx.strokeStyle = COLORS[i];
      ctx.beginPath();
      ctx.moveTo(-100 + i * 50, 0);
      ctx.lineTo(-100 + (i + 1) * 50, 0);
      ctx.stroke();
    }
    ctx.restore();
  } else if (o.type === "bars") {
    const offset = Math.sin(o.angle * 0.5) * 60;
    ctx.lineWidth = 14;
    for (let i = 0; i < 4; i++) {
      ctx.strokeStyle = COLORS[i];
      const bx = (W / 5) * (i + 1) + offset;
      ctx.beginPath();
      ctx.moveTo(bx, yS - 10);
      ctx.lineTo(bx, yS + 10);
      ctx.stroke();
    }
  } else if (o.type === "cross") {
    ctx.save(); ctx.translate(cx, yS); ctx.rotate(o.angle);
    ctx.lineWidth = 14;
    for (let k = 0; k < 2; k++) {
      ctx.save();
      ctx.rotate(k * Math.PI / 2);
      for (let i = 0; i < 4; i++) {
        ctx.strokeStyle = COLORS[i];
        ctx.beginPath();
        ctx.moveTo(-100 + i * 50, 0);
        ctx.lineTo(-100 + (i + 1) * 50, 0);
        ctx.stroke();
      }
      ctx.restore();
    }
    ctx.restore();
  } else if (o.type === "square") {
    ctx.save(); ctx.translate(cx, yS); ctx.rotate(o.angle);
    const s = 80;
    ctx.lineWidth = 14;
    const sides = [[-s, -s, s, -s], [s, -s, s, s], [s, s, -s, s], [-s, s, -s, -s]];
    for (let i = 0; i < 4; i++) {
      ctx.strokeStyle = COLORS[i];
      ctx.beginPath();
      ctx.moveTo(sides[i][0], sides[i][1]);
      ctx.lineTo(sides[i][2], sides[i][3]);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawStar(s) {
  if (s.taken) return;
  const yS = s.y - scrollY;
  if (yS < -20 || yS > H + 20) return;
  ctx.save();
  ctx.translate(s.x, yS);
  ctx.fillStyle = "rgba(252,211,77,0.95)";
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const r = i % 2 ? 4 : 11;
    const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
    ctx[i ? "lineTo" : "moveTo"](Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawBasic() {
  const yS = ball.y - scrollY;
  ctx.fillStyle = ball.color;
  ctx.beginPath(); ctx.arc(ball.x, yS, ball.r, 0, Math.PI * 2); ctx.fill();
}
function drawStripe() {
  const yS = ball.y - scrollY;
  ctx.save();
  ctx.beginPath(); ctx.arc(ball.x, yS, ball.r, 0, Math.PI * 2); ctx.clip();
  ctx.fillStyle = ball.color; ctx.fillRect(ball.x - ball.r, yS - ball.r, ball.r * 2, ball.r * 2);
  ctx.fillStyle = "rgba(255,255,255,0.7)";
  for (let i = -2; i < 3; i++) {
    ctx.fillRect(ball.x - ball.r, yS - ball.r + i * 6 + 1, ball.r * 2, 2);
  }
  ctx.restore();
}
function drawGlow() {
  const yS = ball.y - scrollY;
  ctx.shadowColor = ball.color; ctx.shadowBlur = 18;
  ctx.fillStyle = ball.color;
  ctx.beginPath(); ctx.arc(ball.x, yS, ball.r, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
}
function drawFlame() {
  const yS = ball.y - scrollY;
  ctx.fillStyle = "rgba(252, 211, 77, 0.55)";
  for (let i = 1; i < 6; i++) {
    ctx.beginPath();
    ctx.arc(ball.x + (Math.random() - 0.5) * 4, yS + i * 4 + 4, ball.r - i * 1.4, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = ball.color;
  ctx.beginPath(); ctx.arc(ball.x, yS, ball.r, 0, Math.PI * 2); ctx.fill();
}
function drawRainbow() {
  const yS = ball.y - scrollY;
  for (let i = 0; i < 6; i++) {
    ctx.fillStyle = `hsl(${(performance.now() * 0.2 + i * 60) % 360}, 80%, 60%)`;
    ctx.beginPath(); ctx.arc(ball.x, yS, ball.r - i * 1.2, 0, Math.PI * 2); ctx.fill();
  }
}

function die(reason) {
  alive = false;
  msgEl.textContent = `${reason} Score ${score}.`;
  GG.save(SLUG, saved);
  draw();
}

// shop
function renderShop() {
  shopEl.innerHTML = "";
  Object.entries(SKINS).forEach(([id, s]) => {
    const owned = saved.unlockedSkins.includes(id);
    const can = saved.totalStars >= s.cost;
    const btn = document.createElement("button");
    btn.className = "game-btn" + (owned ? "" : " locked") + (saved.currentSkin === id ? " active" : "");
    btn.textContent = owned
      ? (saved.currentSkin === id ? `${s.name} ★` : s.name)
      : `${s.name} – ${s.cost}★`;
    btn.disabled = !owned && !can;
    btn.addEventListener("click", () => {
      if (!owned) {
        if (!can) return;
        saved.totalStars -= s.cost;
        saved.unlockedSkins.push(id);
      }
      saved.currentSkin = id;
      starsEl.textContent = saved.totalStars;
      GG.save(SLUG, saved);
      renderShop();
    });
    shopEl.appendChild(btn);
  });
}
renderShop();
reset();
draw();
</script>
</body>
</html>
