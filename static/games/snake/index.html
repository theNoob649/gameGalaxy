<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Snake</title>
<link rel="stylesheet" href="../_shared/game.css">
</head>
<body>
<div class="game-shell">
  <div class="game-hud">
    <span>Score: <strong id="score">0</strong></span>
    <span>Best: <strong id="best">0</strong></span>
    <button class="game-btn primary" id="play">Play</button>
  </div>
  <canvas id="cv" width="480" height="480"></canvas>
  <div class="game-message" id="msg">Arrow keys or WASD to move.</div>
</div>
<script src="../_shared/gg.js"></script>
<script>
const SLUG = "snake";
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
const N = 20;
const CELL = cv.width / N;
let snake, dir, queuedDir, food, score, alive, tickMs, lastTick;
let saved = GG.load(SLUG, { best: 0 }) || { best: 0 };

const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const msgEl = document.getElementById("msg");
bestEl.textContent = saved.best;

function reset() {
  snake = [{x: 9, y: 10}, {x: 10, y: 10}, {x: 11, y: 10}];
  dir = {x: 1, y: 0};
  queuedDir = dir;
  placeFood();
  score = 0;
  alive = true;
  tickMs = 110;
  lastTick = 0;
  scoreEl.textContent = 0;
  msgEl.textContent = "Arrow keys or WASD to move.";
}

function placeFood() {
  while (true) {
    const f = { x: Math.floor(Math.random() * N), y: Math.floor(Math.random() * N) };
    if (!snake.some((s) => s.x === f.x && s.y === f.y)) { food = f; return; }
  }
}

function step() {
  dir = queuedDir;
  const head = { x: snake[snake.length - 1].x + dir.x, y: snake[snake.length - 1].y + dir.y };
  if (head.x < 0 || head.x >= N || head.y < 0 || head.y >= N) return die();
  if (snake.some((s) => s.x === head.x && s.y === head.y)) return die();
  snake.push(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    placeFood();
    if (tickMs > 60) tickMs -= 1.5;
  } else {
    snake.shift();
  }
}

function die() {
  alive = false;
  let newBest = false;
  if (score > saved.best) {
    saved.best = score;
    GG.save(SLUG, saved);
    bestEl.textContent = score;
    msgEl.textContent = `Game over. New best: ${score}!`;
    newBest = true;
  } else {
    msgEl.textContent = `Game over. Score: ${score}.`;
  }
  if (window.GG && GG.youLose) GG.youLose("You Lose", `Score ${score}.${newBest ? " New best!" : ""}`);
}

function draw() {
  ctx.fillStyle = "#0e1430";
  ctx.fillRect(0, 0, cv.width, cv.height);
  ctx.fillStyle = "#ff6b9d";
  ctx.beginPath();
  ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL * 0.35, 0, Math.PI * 2);
  ctx.fill();
  for (let i = 0; i < snake.length; i++) {
    const seg = snake[i];
    const t = i / snake.length;
    ctx.fillStyle = i === snake.length - 1 ? "#a78bfa" : `rgba(124, 92, 255, ${0.5 + 0.5 * t})`;
    ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
  }
}

function loop(ts) {
  if (!alive) { draw(); return; }
  if (!lastTick) lastTick = ts;
  if (ts - lastTick >= tickMs) {
    step();
    lastTick = ts;
  }
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  let nd = null;
  if (k === "arrowup" || k === "w") nd = { x: 0, y: -1 };
  else if (k === "arrowdown" || k === "s") nd = { x: 0, y: 1 };
  else if (k === "arrowleft" || k === "a") nd = { x: -1, y: 0 };
  else if (k === "arrowright" || k === "d") nd = { x: 1, y: 0 };
  if (nd && (nd.x !== -dir.x || nd.y !== -dir.y) && !(nd.x === dir.x && nd.y === dir.y)) {
    queuedDir = nd;
  }
  if ([" ", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(k)) e.preventDefault();
});

document.getElementById("play").addEventListener("click", () => {
  reset();
  requestAnimationFrame(loop);
});

reset();
draw();
</script>
</body>
</html>
