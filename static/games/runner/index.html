<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sky Runner</title>
<link rel="stylesheet" href="../_shared/game.css">
</head>
<body>
<div class="game-shell">
  <div class="game-hud">
    <span>Distance: <strong id="dist">0</strong></span>
    <span>Coins: <strong id="coins">0</strong></span>
    <span>Best: <strong id="best">0</strong></span>
    <button class="game-btn primary" id="play">Run</button>
  </div>
  <canvas id="cv" width="640" height="320"></canvas>
  <div class="game-message" id="msg">Spacebar / click to jump.</div>
</div>
<script src="../_shared/gg.js"></script>
<script>
const SLUG = "runner";
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
const W = cv.width, H = cv.height;
const GROUND = H - 40;

let saved = GG.load(SLUG, { best: 0 }) || { best: 0 };
let runner, obstacles, coins, dist, coinsCount, speed, frames, alive, started;
const distEl = document.getElementById("dist");
const coinsEl = document.getElementById("coins");
const bestEl = document.getElementById("best");
const msgEl = document.getElementById("msg");
bestEl.textContent = saved.best;

function reset() {
  runner = { x: 80, y: GROUND - 36, w: 26, h: 36, vy: 0, onGround: true };
  obstacles = []; coins = [];
  dist = 0; coinsCount = 0; speed = 3.2; frames = 0;
  alive = true; started = false;
  distEl.textContent = 0;
  coinsEl.textContent = 0;
  msgEl.textContent = "Spacebar / click to jump.";
}

function jump() {
  if (!alive) return;
  started = true;
  if (runner.onGround) {
    runner.vy = -11;
    runner.onGround = false;
  }
}

function tick() {
  if (!alive) return;
  frames++;
  if (started) {
    runner.vy += 0.5;
    runner.y += runner.vy;
    if (runner.y + runner.h >= GROUND) {
      runner.y = GROUND - runner.h;
      runner.vy = 0;
      runner.onGround = true;
    }
    speed = Math.min(7.5, 3.2 + dist / 1600);
    dist += speed / 8;
    distEl.textContent = Math.floor(dist);
    if (frames % 95 === 0 || (frames > 90 && Math.random() < 0.008 * (speed / 3.2))) {
      const tall = Math.random() < 0.35;
      obstacles.push({
        x: W + 20,
        y: GROUND - (tall ? 50 : 30),
        w: tall ? 22 : 30,
        h: tall ? 50 : 30,
      });
    }
    if (frames % 140 === 0) {
      coins.push({ x: W + 20, y: GROUND - 60 - Math.random() * 90, r: 8 });
    }
    obstacles.forEach((o) => o.x -= speed);
    coins.forEach((c) => c.x -= speed);
    obstacles = obstacles.filter((o) => o.x + o.w > 0);
    coins = coins.filter((c) => c.x + c.r > 0);
    for (const o of obstacles) {
      if (rectHit(runner, o)) return die();
    }
    coins = coins.filter((c) => {
      if (circRectHit(c, runner)) {
        coinsCount++;
        coinsEl.textContent = coinsCount;
        return false;
      }
      return true;
    });
  }
  draw();
  requestAnimationFrame(tick);
}

function rectHit(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}
function circRectHit(c, r) {
  const cx = Math.max(r.x, Math.min(c.x, r.x + r.w));
  const cy = Math.max(r.y, Math.min(c.y, r.y + r.h));
  const dx = c.x - cx, dy = c.y - cy;
  return dx * dx + dy * dy < c.r * c.r;
}

function draw() {
  ctx.fillStyle = "#0e1430";
  ctx.fillRect(0, 0, W, H);
  // stars
  for (let i = 0; i < 30; i++) {
    const sx = (i * 73 + frames * 0.4) % W;
    const sy = (i * 37) % (GROUND - 20);
    ctx.fillStyle = "rgba(255,255,255,0.3)";
    ctx.fillRect(sx, sy, 2, 2);
  }
  // ground
  ctx.fillStyle = "#1a2240";
  ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.strokeStyle = "#2a335a";
  ctx.beginPath();
  ctx.moveTo(0, GROUND);
  ctx.lineTo(W, GROUND);
  ctx.stroke();
  // runner
  ctx.fillStyle = "#7c5cff";
  ctx.fillRect(runner.x, runner.y, runner.w, runner.h);
  ctx.fillStyle = "#fcd34d";
  ctx.fillRect(runner.x + 6, runner.y + 8, 5, 5);
  // obstacles
  ctx.fillStyle = "#f87171";
  for (const o of obstacles) ctx.fillRect(o.x, o.y, o.w, o.h);
  // coins
  ctx.fillStyle = "#ffd166";
  for (const c of coins) {
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function die() {
  alive = false;
  const finalDist = Math.floor(dist);
  const score = finalDist + coinsCount * 10;
  const prev = saved.best || 0;
  if (score > prev) {
    saved.best = score;
    GG.save(SLUG, saved);
    bestEl.textContent = score;
    msgEl.textContent = `Crashed! New best: ${score} (distance ${finalDist}, coins ${coinsCount}).`;
  } else {
    msgEl.textContent = `Crashed! Score: ${score}.`;
  }
  draw();
}

cv.addEventListener("mousedown", jump);
cv.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); });
window.addEventListener("keydown", (e) => {
  if (e.key === " " || e.code === "Space") { e.preventDefault(); jump(); }
});
document.getElementById("play").addEventListener("click", () => {
  reset();
  requestAnimationFrame(tick);
});

reset();
draw();
</script>
</body>
</html>
