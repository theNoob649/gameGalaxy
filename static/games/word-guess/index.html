<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Word Guess</title>
<link rel="stylesheet" href="../_shared/game.css">
<style>
  .wg-modes { display: flex; gap: 6px; }
  .wg-modes button.active { border-color: var(--accent); }
  .wg-grid {
    display: grid;
    gap: 6px;
    max-height: 60vh;
    overflow-y: auto;
    padding: 4px;
  }
  .wg-row { display: grid; grid-template-columns: repeat(5, 56px); gap: 6px; }
  .wg-tile {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 8px;
    display: grid; place-items: center;
    font-size: 28px; font-weight: 800;
    text-transform: uppercase;
    width: 56px; height: 56px;
  }
  .wg-tile.filled { border-color: var(--text-dim); }
  .wg-tile.hit   { background: var(--good); border-color: var(--good); color: white; }
  .wg-tile.near  { background: #e0a800; border-color: #e0a800; color: white; }
  .wg-tile.miss  { background: #2a335a; border-color: #2a335a; color: var(--text-dim); }
  .wg-keyboard { display: flex; flex-direction: column; gap: 6px; }
  .wg-krow { display: flex; gap: 6px; justify-content: center; }
  .wg-key {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    font: inherit;
    font-weight: 700;
    padding: 10px 8px;
    min-width: 32px;
    cursor: pointer;
  }
  .wg-key.wide { padding: 10px 14px; }
  .wg-key.hit  { background: var(--good); border-color: var(--good); color: white; }
  .wg-key.near { background: #e0a800; border-color: #e0a800; color: white; }
  .wg-key.miss { background: #2a335a; color: var(--text-dim); }
  .wg-stats { font-size: 13px; color: var(--text-dim); }
</style>
</head>
<body>
<div class="game-shell">
  <div class="game-hud">
    <div class="wg-modes">
      <button class="game-btn" data-mode="daily">Daily</button>
      <button class="game-btn" data-mode="infinite">Infinite</button>
      <button class="game-btn" data-mode="unlimited">Unlimited</button>
    </div>
    <span>Streak: <strong id="streak">0</strong></span>
    <span>Played: <strong id="played">0</strong></span>
    <span>Won: <strong id="won">0</strong></span>
    <button class="game-btn primary" id="newGame" style="display:none">New word</button>
  </div>
  <div id="grid" class="wg-grid"></div>
  <div id="msg" class="game-message">Guess the 5-letter word.</div>
  <div id="keyboard" class="wg-keyboard"></div>
</div>
<script src="../_shared/gg.js"></script>
<script src="words.js"></script>
<script>
const SLUG = "word-guess";
const ANSWERS = window.GG_ANSWERS;
const VALID = new Set(window.GG_VALID);
const LEN = 5;
const DAILY_ROWS = 6;        // daily and infinite both cap at 6 guesses
const INFINITE_ROWS = 6;

function dayKey() {
  const d = new Date();
  return d.getUTCFullYear() + "-" + String(d.getUTCMonth() + 1).padStart(2, "0")
       + "-" + String(d.getUTCDate()).padStart(2, "0");
}
function dayIndex() {
  const epoch = Date.UTC(2024, 0, 1);
  return Math.floor((Date.now() - epoch) / 86400000);
}
function dailyAnswer() {
  return ANSWERS[((dayIndex() % ANSWERS.length) + ANSWERS.length) % ANSWERS.length];
}
function randomAnswer() {
  return ANSWERS[Math.floor(Math.random() * ANSWERS.length)];
}

// Persisted shape:
//   { mode, daily: {day, answer, guesses, done, streak, played, won, lastWonDay},
//     infinite: {answer, guesses, done, played, won, streak},
//     unlimited: {answer, guesses, done, played, won} }
const persisted = GG.load(SLUG, null) || {};
function freshDaily() {
  return { day: dayKey(), answer: dailyAnswer(), guesses: [], done: false,
           streak: 0, played: 0, won: 0, lastWonDay: null };
}
function freshInfinite() {
  return { answer: randomAnswer(), guesses: [], done: false, played: 0, won: 0, streak: 0 };
}
function freshUnlimited() {
  return { answer: randomAnswer(), guesses: [], done: false, played: 0, won: 0 };
}

let state = {
  mode: persisted.mode || "daily",
  daily: persisted.daily || freshDaily(),
  infinite: persisted.infinite || freshInfinite(),
  unlimited: persisted.unlimited || freshUnlimited(),
};
// Migrate old persisted state if present (pre-mode versions kept everything at top level)
if (!persisted.mode && persisted.day) {
  state.daily = {
    day: persisted.day,
    answer: dailyAnswer(),
    guesses: persisted.guesses || [],
    done: persisted.done || false,
    streak: persisted.streak || 0,
    played: persisted.played || 0,
    won: persisted.won || 0,
    lastWonDay: persisted.lastWonDay || null,
  };
}
// If daily state is from a previous day, refresh it
if (state.daily.day !== dayKey()) {
  const prev = state.daily;
  state.daily = freshDaily();
  state.daily.streak = prev.streak || 0;
  state.daily.played = prev.played || 0;
  state.daily.won = prev.won || 0;
  state.daily.lastWonDay = prev.lastWonDay || null;
}

function persist() { GG.save(SLUG, state); }

const gridEl = document.getElementById("grid");
const kbEl = document.getElementById("keyboard");
const msgEl = document.getElementById("msg");
const streakEl = document.getElementById("streak");
const playedEl = document.getElementById("played");
const wonEl = document.getElementById("won");
const newGameBtn = document.getElementById("newGame");

let current = "";

function activeState() { return state[state.mode]; }

function score(guess, answer) {
  const result = Array(LEN).fill("miss");
  const ans = answer.split("");
  for (let i = 0; i < LEN; i++) {
    if (guess[i] === ans[i]) { result[i] = "hit"; ans[i] = null; }
  }
  for (let i = 0; i < LEN; i++) {
    if (result[i] === "hit") continue;
    const idx = ans.indexOf(guess[i]);
    if (idx >= 0) { result[i] = "near"; ans[idx] = null; }
  }
  return result;
}

function maxRowsForMode() {
  if (state.mode === "unlimited") return activeState().guesses.length + 1;
  return state.mode === "infinite" ? INFINITE_ROWS : DAILY_ROWS;
}

function renderGrid() {
  const s = activeState();
  const rows = state.mode === "unlimited"
    ? s.guesses.length + (s.done ? 0 : 1)
    : (state.mode === "infinite" ? INFINITE_ROWS : DAILY_ROWS);
  gridEl.style.gridTemplateRows = `repeat(${rows}, 56px)`;
  gridEl.innerHTML = "";
  for (let r = 0; r < rows; r++) {
    const row = document.createElement("div");
    row.className = "wg-row";
    for (let c = 0; c < LEN; c++) {
      const t = document.createElement("div");
      t.className = "wg-tile";
      if (r < s.guesses.length) {
        const g = s.guesses[r];
        const sc = score(g, s.answer);
        t.textContent = g[c];
        t.classList.add(sc[c]);
      } else if (r === s.guesses.length) {
        t.textContent = current[c] || "";
        if (current[c]) t.classList.add("filled");
      }
      row.appendChild(t);
    }
    gridEl.appendChild(row);
  }
  streakEl.textContent = s.streak || 0;
  playedEl.textContent = s.played || 0;
  wonEl.textContent = s.won || 0;
  renderKeyboard();
}

function bestStateForLetter(letter) {
  const s = activeState();
  let best = null;
  const order = { miss: 0, near: 1, hit: 2 };
  for (const g of s.guesses) {
    const sc = score(g, s.answer);
    for (let i = 0; i < LEN; i++) {
      if (g[i] === letter) {
        if (best == null || order[sc[i]] > order[best]) best = sc[i];
      }
    }
  }
  return best;
}

function renderKeyboard() {
  const layout = ["qwertyuiop", "asdfghjkl", "@zxcvbnm#"];
  kbEl.innerHTML = "";
  for (const row of layout) {
    const r = document.createElement("div");
    r.className = "wg-krow";
    for (const ch of row) {
      const key = document.createElement("button");
      key.className = "wg-key";
      if (ch === "@") { key.classList.add("wide"); key.textContent = "Enter"; key.dataset.k = "Enter"; }
      else if (ch === "#") { key.classList.add("wide"); key.textContent = "⌫"; key.dataset.k = "Backspace"; }
      else {
        key.textContent = ch.toUpperCase();
        key.dataset.k = ch;
        const st = bestStateForLetter(ch);
        if (st) key.classList.add(st);
      }
      key.addEventListener("click", () => handleKey(key.dataset.k));
      r.appendChild(key);
    }
    kbEl.appendChild(r);
  }
}

function handleKey(k) {
  const s = activeState();
  if (s.done) return;
  if (k === "Enter") {
    if (current.length !== LEN) { flash("Need 5 letters."); return; }
    if (!VALID.has(current)) { flash("Not in the word list."); return; }
    submit(current);
    current = "";
    renderGrid();
    return;
  }
  if (k === "Backspace") { current = current.slice(0, -1); renderGrid(); return; }
  if (/^[a-z]$/i.test(k) && current.length < LEN) {
    current += k.toLowerCase();
    renderGrid();
  }
}

function flash(text) {
  msgEl.textContent = text;
  setTimeout(() => {
    const s = activeState();
    if (s.done) return;
    msgEl.textContent = "Guess the 5-letter word.";
  }, 1500);
}

function submit(guess) {
  const s = activeState();
  s.guesses.push(guess);
  const correct = guess === s.answer;

  if (state.mode === "daily") {
    if (correct) {
      s.done = true; s.played++; s.won++;
      const yesterday = (() => {
        const d = new Date(s.day + "T00:00:00Z"); d.setUTCDate(d.getUTCDate() - 1);
        return d.toISOString().slice(0, 10);
      })();
      s.streak = (s.lastWonDay === yesterday || s.lastWonDay === s.day)
        ? (s.streak || 0) + (s.lastWonDay === s.day ? 0 : 1)
        : 1;
      s.lastWonDay = s.day;
      msgEl.textContent = `Got it in ${s.guesses.length}.`;
      if (window.GG && GG.youWin) GG.youWin("You Win!", `Got "${s.answer.toUpperCase()}" in ${s.guesses.length}/${DAILY_ROWS}. Streak: ${s.streak}.`);
    } else if (s.guesses.length >= DAILY_ROWS) {
      s.done = true; s.played++; s.streak = 0;
      msgEl.textContent = `Out of guesses. Word was "${s.answer.toUpperCase()}".`;
      if (window.GG && GG.youLose) GG.youLose("You Lose", `The word was "${s.answer.toUpperCase()}". Come back tomorrow.`);
    }
  } else if (state.mode === "infinite") {
    if (correct) {
      s.played++; s.won++; s.streak = (s.streak || 0) + 1;
      msgEl.textContent = `Got it in ${s.guesses.length}. New word.`;
      // Start a fresh word right away
      s.answer = randomAnswer();
      s.guesses = [];
      s.done = false;
    } else if (s.guesses.length >= INFINITE_ROWS) {
      s.done = true; s.played++; s.streak = 0;
      msgEl.textContent = `Out of guesses. Word was "${s.answer.toUpperCase()}".`;
      newGameBtn.style.display = "";
      if (window.GG && GG.youLose) GG.youLose("You Lose", `Streak ended. Word was "${s.answer.toUpperCase()}".`);
    }
  } else { // unlimited: cannot fail
    if (correct) {
      s.done = true; s.played++; s.won++;
      msgEl.textContent = `Solved in ${s.guesses.length} guesses.`;
      newGameBtn.style.display = "";
      if (window.GG && GG.youWin) GG.youWin("You Win!", `Got "${s.answer.toUpperCase()}" in ${s.guesses.length} guesses.`);
    }
    // no fail path, grid just expands
  }
  persist();
}

window.addEventListener("keydown", (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === "Enter") { e.preventDefault(); handleKey("Enter"); }
  else if (e.key === "Backspace") { e.preventDefault(); handleKey("Backspace"); }
  else if (/^[a-z]$/i.test(e.key)) handleKey(e.key);
});

// --- mode buttons ---
function setMode(m) {
  state.mode = m;
  current = "";
  document.querySelectorAll(".wg-modes button").forEach((b) =>
    b.classList.toggle("active", b.dataset.mode === m));
  const s = activeState();
  newGameBtn.style.display = s.done && state.mode !== "daily" ? "" : "none";
  msgEl.textContent = m === "daily"
    ? "Guess today's 5-letter word."
    : m === "infinite"
    ? "Solve to start a new word automatically. 6 guesses each."
    : "Unlimited guesses. The grid grows until you find the word.";
  if (s.done && state.mode === "daily") {
    const last = s.guesses[s.guesses.length - 1];
    msgEl.textContent = last === s.answer
      ? `Solved today in ${s.guesses.length}.`
      : `Today's word was "${s.answer.toUpperCase()}". Come back tomorrow.`;
  }
  persist();
  renderGrid();
}

document.querySelectorAll(".wg-modes button").forEach((b) => {
  b.addEventListener("click", () => setMode(b.dataset.mode));
});

newGameBtn.addEventListener("click", () => {
  if (state.mode === "infinite") state.infinite = freshInfinite();
  else if (state.mode === "unlimited") state.unlimited = freshUnlimited();
  current = "";
  newGameBtn.style.display = "none";
  persist();
  renderGrid();
  msgEl.textContent = "New word. Good luck.";
});

setMode(state.mode);
</script>
</body>
</html>
