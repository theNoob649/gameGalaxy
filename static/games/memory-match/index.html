<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Memory Match</title>
<link rel="stylesheet" href="../_shared/game.css">
<style>
  .mm-grid {
    display: grid;
    gap: 8px;
    margin: 0 auto;
  }
  .mm-card {
    width: 80px; height: 80px;
    perspective: 600px;
    cursor: pointer;
  }
  .mm-card-inner {
    position: relative; width: 100%; height: 100%;
    transition: transform 0.4s;
    transform-style: preserve-3d;
  }
  .mm-card.flipped .mm-card-inner,
  .mm-card.matched .mm-card-inner { transform: rotateY(180deg); }
  .mm-face {
    position: absolute; inset: 0;
    border-radius: 12px;
    display: grid; place-items: center;
    backface-visibility: hidden;
    font-size: 36px;
    border: 1px solid var(--border);
  }
  .mm-front {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: white;
  }
  .mm-back {
    transform: rotateY(180deg);
    background: var(--panel);
  }
  .mm-card.matched .mm-back { background: rgba(52, 211, 153, 0.18); border-color: var(--good); }
  .mm-size-pick { display: flex; gap: 6px; }
  .mm-size-pick button.active { border-color: var(--accent); color: var(--text); }
</style>
</head>
<body>
<div class="game-shell">
  <div class="game-hud">
    <span>Moves: <strong id="moves">0</strong></span>
    <span>Time: <strong id="time">0.0s</strong></span>
    <span>Best: <strong id="best">-</strong></span>
    <div class="mm-size-pick">
      <button class="game-btn" data-size="4">4×4</button>
      <button class="game-btn" data-size="6">6×6</button>
    </div>
    <button class="game-btn primary" id="newGame">New game</button>
  </div>
  <div id="grid" class="mm-grid"></div>
  <div class="game-message" id="msg">Match every pair.</div>
</div>
<script src="../_shared/gg.js"></script>
<script>
const SLUG = "memory-match";
const SYMBOLS = ["🦊","🐼","🐸","🦄","🐙","🦋","🐢","🦉","🐝","🦀","🐳","🦩","🐧","🦊","🐵","🐰","🦘","🦒"];
let size = 4;
let cards = [];
let flipped = [];
let matches = 0;
let moves = 0;
let startTs = 0;
let timerId = null;
let locked = false;
let bestTimes = GG.load(SLUG, {}) || {};

const grid = document.getElementById("grid");
const movesEl = document.getElementById("moves");
const timeEl = document.getElementById("time");
const bestEl = document.getElementById("best");
const msgEl = document.getElementById("msg");

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function newGame() {
  if (timerId) clearInterval(timerId);
  startTs = 0;
  moves = 0; matches = 0; flipped = []; locked = false;
  movesEl.textContent = "0";
  timeEl.textContent = "0.0s";
  msgEl.textContent = "Match every pair.";
  const pairCount = (size * size) / 2;
  const picks = SYMBOLS.slice(0, pairCount);
  const deck = shuffle(picks.concat(picks).map((sym, i) => ({ sym, id: i })));
  cards = deck;
  grid.style.gridTemplateColumns = `repeat(${size}, 80px)`;
  grid.innerHTML = "";
  deck.forEach((card, idx) => {
    const el = document.createElement("div");
    el.className = "mm-card";
    el.dataset.idx = idx;
    el.innerHTML = `
      <div class="mm-card-inner">
        <div class="mm-face mm-front">?</div>
        <div class="mm-face mm-back">${card.sym}</div>
      </div>`;
    el.addEventListener("click", () => onFlip(idx, el));
    grid.appendChild(el);
  });
  updateBest();
}

function startTimerIfNeeded() {
  if (startTs) return;
  startTs = performance.now();
  timerId = setInterval(() => {
    timeEl.textContent = ((performance.now() - startTs) / 1000).toFixed(1) + "s";
  }, 100);
}

function onFlip(idx, el) {
  if (locked) return;
  if (el.classList.contains("flipped") || el.classList.contains("matched")) return;
  startTimerIfNeeded();
  el.classList.add("flipped");
  flipped.push({ idx, el });
  if (flipped.length === 2) {
    moves++;
    movesEl.textContent = moves;
    const [a, b] = flipped;
    if (cards[a.idx].sym === cards[b.idx].sym) {
      a.el.classList.add("matched"); b.el.classList.add("matched");
      flipped = [];
      matches++;
      if (matches === cards.length / 2) onWin();
    } else {
      locked = true;
      setTimeout(() => {
        a.el.classList.remove("flipped");
        b.el.classList.remove("flipped");
        flipped = [];
        locked = false;
      }, 700);
    }
  }
}

function onWin() {
  clearInterval(timerId);
  const elapsed = (performance.now() - startTs) / 1000;
  const key = String(size);
  const prev = bestTimes[key];
  let line = `Solved in ${moves} moves and ${elapsed.toFixed(1)}s.`;
  let newBest = false;
  if (prev == null || elapsed < prev) {
    bestTimes[key] = elapsed;
    GG.save(SLUG, bestTimes);
    line += " New best!";
    newBest = true;
    updateBest();
  }
  msgEl.textContent = line;
  GG.youWin("You Win!", `${size}×${size} cleared in ${elapsed.toFixed(1)}s, ${moves} moves.${newBest ? " New best!" : ""}`);
}

function updateBest() {
  const t = bestTimes[String(size)];
  bestEl.textContent = t == null ? "-" : t.toFixed(1) + "s";
}

document.querySelectorAll(".mm-size-pick button").forEach((btn) => {
  btn.addEventListener("click", () => {
    size = parseInt(btn.dataset.size, 10);
    document.querySelectorAll(".mm-size-pick button").forEach((b) =>
      b.classList.toggle("active", b === btn)
    );
    newGame();
  });
});
document.querySelector(".mm-size-pick button[data-size='4']").classList.add("active");
document.getElementById("newGame").addEventListener("click", newGame);

newGame();
</script>
</body>
</html>
