<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Asteroids</title>
<link rel="stylesheet" href="../_shared/game.css">
</head>
<body>
<div class="game-shell">
  <div class="game-hud">
    <span>Score: <strong id="score">0</strong></span>
    <span>Best: <strong id="best">0</strong></span>
    <span>Lives: <strong id="lives">3</strong></span>
    <span>Wave: <strong id="wave">1</strong></span>
    <button class="game-btn primary" id="play">Play</button>
  </div>
  <canvas id="cv" width="600" height="500"></canvas>
  <div class="game-message" id="msg">Rotate with A/D, thrust with W, fire with space.</div>
</div>
<script src="../_shared/gg.js"></script>
<script>
const SLUG = "asteroids";
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
const W = cv.width, H = cv.height;

let saved = GG.load(SLUG, { best: 0 }) || { best: 0 };
saved = Object.assign({ best: 0 }, saved);

const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const livesEl = document.getElementById("lives");
const waveEl = document.getElementById("wave");
const msgEl = document.getElementById("msg");
const playBtn = document.getElementById("play");
bestEl.textContent = saved.best;

const keys = {};
window.addEventListener("keydown", (e) => {
  keys[e.key.toLowerCase()] = true;
  if (["w","a","d"," "].includes(e.key.toLowerCase())) e.preventDefault();
});
window.addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });

let ship, bullets, rocks, score, lives, wave, alive, cooldown, invuln;

function spawnRocks(n) {
  rocks = [];
  for (let i = 0; i < n; i++) {
    let x, y;
    do {
      x = Math.random() * W;
      y = Math.random() * H;
    } while (Math.hypot(x - W / 2, y - H / 2) < 100);
    rocks.push(makeRock(x, y, 3));
  }
}

function makeRock(x, y, size) {
  const a = Math.random() * Math.PI * 2;
  const sp = 30 + (4 - size) * 20;
  const verts = [];
  const r = size === 3 ? 30 : size === 2 ? 20 : 12;
  const n = 8 + Math.floor(Math.random() * 4);
  for (let i = 0; i < n; i++) {
    const ang = (i / n) * Math.PI * 2;
    const rr = r * (0.7 + Math.random() * 0.6);
    verts.push({ x: Math.cos(ang) * rr, y: Math.sin(ang) * rr });
  }
  return { x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, size, r, verts };
}

function newGame() {
  ship = { x: W / 2, y: H / 2, vx: 0, vy: 0, angle: -Math.PI / 2 };
  bullets = [];
  score = 0; lives = 3; wave = 1; alive = true; cooldown = 0; invuln = 1.5;
  scoreEl.textContent = 0;
  livesEl.textContent = lives;
  waveEl.textContent = wave;
  msgEl.textContent = "A/D to rotate, W to thrust, space to fire.";
  spawnRocks(3);
}

function wrap(o) {
  if (o.x < 0) o.x += W; else if (o.x > W) o.x -= W;
  if (o.y < 0) o.y += H; else if (o.y > H) o.y -= H;
}

let lastTs = 0;
function tick(ts) {
  const dt = lastTs ? Math.min(0.033, (ts - lastTs) / 1000) : 0.016;
  lastTs = ts;
  if (alive) {
    if (keys["a"]) ship.angle -= 3.4 * dt;
    if (keys["d"]) ship.angle += 3.4 * dt;
    if (keys["w"]) { ship.vx += Math.cos(ship.angle) * 220 * dt; ship.vy += Math.sin(ship.angle) * 220 * dt; }
    ship.vx *= 0.99; ship.vy *= 0.99;
    ship.x += ship.vx * dt; ship.y += ship.vy * dt;
    wrap(ship);
    cooldown -= dt;
    if (keys[" "] && cooldown <= 0) {
      bullets.push({
        x: ship.x + Math.cos(ship.angle) * 14,
        y: ship.y + Math.sin(ship.angle) * 14,
        vx: Math.cos(ship.angle) * 420 + ship.vx,
        vy: Math.sin(ship.angle) * 420 + ship.vy,
        life: 1.2,
      });
      cooldown = 0.25;
    }
    for (const b of bullets.slice()) {
      b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
      wrap(b);
      if (b.life <= 0) bullets.splice(bullets.indexOf(b), 1);
    }
    for (const r of rocks) {
      r.x += r.vx * dt; r.y += r.vy * dt;
      wrap(r);
    }
    // bullet-rock collisions
    for (const b of bullets.slice()) {
      for (const r of rocks.slice()) {
        if (Math.hypot(r.x - b.x, r.y - b.y) < r.r) {
          bullets.splice(bullets.indexOf(b), 1);
          rocks.splice(rocks.indexOf(r), 1);
          score += (4 - r.size) * 20;
          scoreEl.textContent = score;
          if (r.size > 1) {
            rocks.push(makeRock(r.x, r.y, r.size - 1));
            rocks.push(makeRock(r.x, r.y, r.size - 1));
          }
          break;
        }
      }
    }
    // ship-rock collisions
    invuln -= dt;
    if (invuln <= 0) {
      for (const r of rocks) {
        if (Math.hypot(r.x - ship.x, r.y - ship.y) < r.r + 10) {
          lives--;
          livesEl.textContent = lives;
          if (lives <= 0) return die();
          ship.x = W / 2; ship.y = H / 2; ship.vx = ship.vy = 0;
          invuln = 1.5;
          break;
        }
      }
    }
    if (rocks.length === 0) {
      wave++;
      waveEl.textContent = wave;
      spawnRocks(3 + wave - 1);
      invuln = 1.5;
    }
  }
  draw();
  requestAnimationFrame(tick);
}

function die() {
  alive = false;
  if (score > saved.best) { saved.best = score; bestEl.textContent = score; }
  GG.save(SLUG, saved);
  msgEl.textContent = `Game over. Score ${score}.`;
  if (window.GG && GG.youLose) GG.youLose("You Lose", `Score ${score}, wave ${wave}.`);
}

function draw() {
  ctx.fillStyle = "#0a0e1f";
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = "rgba(255,255,255,0.3)";
  for (let i = 0; i < 60; i++) {
    const x = (i * 73) % W, y = (i * 137) % H;
    ctx.fillRect(x, y, 2, 2);
  }
  // ship
  ctx.save();
  ctx.translate(ship.x, ship.y);
  ctx.rotate(ship.angle);
  if (invuln > 0 && Math.floor(invuln * 10) % 2 === 0) ctx.globalAlpha = 0.4;
  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(14, 0);
  ctx.lineTo(-10, 8);
  ctx.lineTo(-6, 0);
  ctx.lineTo(-10, -8);
  ctx.closePath();
  ctx.stroke();
  if (keys["w"]) {
    ctx.strokeStyle = "#fcd34d";
    ctx.beginPath();
    ctx.moveTo(-6, 4);
    ctx.lineTo(-16, 0);
    ctx.lineTo(-6, -4);
    ctx.stroke();
  }
  ctx.restore();
  // rocks
  ctx.strokeStyle = "#cbd5e1";
  ctx.lineWidth = 2;
  for (const r of rocks) {
    ctx.beginPath();
    for (let i = 0; i < r.verts.length; i++) {
      const v = r.verts[i];
      const x = r.x + v.x, y = r.y + v.y;
      i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
  }
  // bullets
  ctx.fillStyle = "#fcd34d";
  for (const b of bullets) {
    ctx.beginPath(); ctx.arc(b.x, b.y, 2, 0, Math.PI * 2); ctx.fill();
  }
}

playBtn.addEventListener("click", () => { newGame(); playBtn.textContent = "Restart"; });
newGame();
alive = false;
msgEl.textContent = "Press Play to start.";
requestAnimationFrame(tick);
</script>
</body>
</html>
