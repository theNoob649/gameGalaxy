{% extends "base.html" %}
{% block title %}Sign up — Game Galaxy{% endblock %}
{% block content %}
<section class="auth-card">
  <h1>Create your account</h1>
  <form method="post" class="auth-form">
    <label>
      <span>Username</span>
      <input type="text" name="username" value="{{ username }}" autocomplete="username" minlength="3" maxlength="32" required autofocus>
    </label>
    <label>
      <span>Password</span>
      <input type="password" name="password" autocomplete="new-password" minlength="6" required>
    </label>
    <label>
      <span>Email <em>(optional)</em></span>
      <input type="email" name="email" value="{{ email }}" autocomplete="email">
      <small class="hint">Only used to recover your account if you forget your password. Without an email, a forgotten password can't be recovered.</small>
    </label>
    <button type="submit" class="btn btn-primary btn-block">Create account</button>
  </form>
  <p class="auth-foot">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
</section>
{% endblock %}
