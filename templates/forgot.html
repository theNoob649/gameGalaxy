{% extends "base.html" %}
{% block title %}Forgot password — Game Galaxy{% endblock %}
{% block content %}
<section class="auth-card">
  <h1>Forgot password</h1>
  <p class="muted">Enter your username. If an email is on file, we'll send a reset link.</p>
  <form method="post" class="auth-form">
    <label>
      <span>Username</span>
      <input type="text" name="username" autocomplete="username" required autofocus>
    </label>
    <button type="submit" class="btn btn-primary btn-block">Send reset link</button>
  </form>
  <p class="auth-foot"><a href="{{ url_for('login') }}">Back to sign in</a></p>
</section>
{% endblock %}
