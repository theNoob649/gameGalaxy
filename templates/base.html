<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Game Galaxy{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" sizes="any">
  <link rel="icon" href="{{ url_for('static', filename='img/logo-32.png') }}" type="image/png" sizes="32x32">
  <link rel="icon" href="{{ url_for('static', filename='img/logo-192.png') }}" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/logo-180.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('home') }}">
      <img class="brand-mark" src="{{ url_for('static', filename='img/logo-64.png') }}" alt="Game Galaxy" width="36" height="36">
      <span class="brand-name">Game Galaxy</span>
    </a>
  </header>

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <span>Made by Evander S. Saves stay on your device.</span>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
